<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OAuth2 Redirect</title>
  <style>
    body, html {
      background-color: #111; /* Dark gray background */
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden; /* Prevent scrollbars */
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .close-text {
      color: white; /* White text color */
      font-size: 48px; /* Increased font size */
    }
    .close-text2 {
      color: white; /* White text color */
      font-size: 30px; /* Increased font size */
    }
    .center-container {
      position: absolute;
      text-align: center;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
<script>
window.onload = function() {
    const params = new URLSearchParams(window.location.hash.substring(1));
    const access_token = params.get('access_token');
    const expires_in = params.get('expires_in');
    const token_type = params.get('token_type');

    if (access_token) {
        const message = {
            type: 'authentication',
            access_token: access_token,
            expires_in: expires_in,
            token_type: token_type
        };

        // BroadcastChannel works when the game is not iframed (same top-level origin)
        try {
            const channel = new BroadcastChannel('token_bridge');
            channel.postMessage(message);
            channel.close();
        } catch (e) {
            console.warn("BroadcastChannel failed:", e);
        }

        // window.opener.postMessage works when the game is iframed on a third-party domain
        // (BroadcastChannel is partitioned by top-level site in modern browsers)
        if (window.opener) {
            try {
                window.opener.postMessage(message, window.location.origin);
            } catch (e) {
                console.warn("window.opener.postMessage failed:", e);
            }
        }
    }
};
</script>
</head>
<body>

  <div class="center-container">
<span class="close-text">Signed in.</span><br>
<br>
<span class="close-text2">You can close this tab now.</span>
  </div>
</body>
</html>
